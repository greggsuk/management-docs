<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal | Greggs UK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gitbook-blue: #3884ff;
            --text-main: #242a31;
            --border-color: #e6ecf1;
        }
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background-color: #f5f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .hub-container { text-align: center; width: 100%; max-width: 900px; padding: 20px; }
        h1 { color: var(--text-main); font-size: 2.2rem; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--gitbook-blue); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card i { font-size: 3.5rem; color: var(--gitbook-blue); margin-bottom: 20px; }
        .card h2 { margin: 0; color: var(--text-main); font-size: 1.4rem; }
        .card p { color: #5c6975; font-size: 0.95rem; line-height: 1.5; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="hub-container">
        <i class="fa-solid fa-bread-slice" style="color: var(--gitbook-blue); font-size: 3rem; margin-bottom: 20px;"></i>
        <h1>Greggs UK Management Portal</h1>
        <div class="grid">
            <a href="shift-guidelines.html" class="card">
                <i class="fa-solid fa-clock"></i>
                <h2>Event Guidelines</h2>
                <p>Protocols for hosting events within GREGGS UK.</p>
            </a>
            <a href="management.html" class="card">
                <i class="fa-solid fa-clipboard-list"></i>
                <h2>Management Guidelines</h2>
                <p>Rules, professionalism, and official procedures for staff.</p>
            </a>
        </div>
    </div>
</body>
</html>
